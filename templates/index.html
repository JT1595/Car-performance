<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supercar Performance Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background: #111; 
            color: #ffffff;  /* Default text to white for specs */
            font-family: 'Segoe UI', sans-serif; 
        }
        .card { 
            background: #1a1a1a; 
            border: none; 
            transition: 0.3s; 
        }
        .card:hover { 
            transform: scale(1.05); 
            box-shadow: 0 10px 20px rgba(255,215,0,0.3); 
        }
        .card-img-top { 
            height: 220px; 
            object-fit: cover; 
        }
        h1 { 
            color: #ffc107;  /* Yellow for main header */
            text-shadow: 0 0 15px #ffc107; 
        }
        .brand-model { 
            color: #ffc107 !important;  /* Yellow for brand and model */
        }
        p, strong { 
            color: #ffffff !important;  /* White for specs text */
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <h1 class="text-center mb-5 display-4">Supercar Performance Hub</h1>
        
        <div class="row g-4">
            {% for car in cars %}
            <div class="col-md-6 col-lg-4">
                <div class="card h-100">
                    <img src="{{ car.image }}" class="card-img-top" alt="{{ car.brand }}">
                    <div class="card-body">
                        <h3 class="card-title brand-model">{{ car.brand }}</h3>
                        <h5 class="brand-model">{{ car.model }}</h5>
                        <p><strong>0-100 km/h:</strong> {{ car.zero_to_100 }}</p>
                        <p><strong>Torque:</strong> {{ car.torque }}</p>
                        <p><strong>Power:</strong> {{ car.hp }}</p>
                        <p><strong>Top Speed:</strong> {{ car.top_speed }}</p>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
