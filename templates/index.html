<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Supercar Performance</title>
    <style>
        body { font-family: Arial, sans-serif; background: #111; color: #fff; text-align: center; }
        h1 { color: #FFD700; }
        .car { display: inline-block; margin: 20px; padding: 10px; background: #222; border-radius: 10px; width: 250px; }
        .car img { width: 100%; border-radius: 10px; }
        .car p { margin: 5px 0; }
    </style>
</head>
<body>
    <h1>Supercar Performance</h1>
    {% for car in cars %}
    <div class="car">
        <img src="{{ url_for('static', filename='images/' + car.image) }}" alt="{{ car.brand }}">
        <h2>{{ car.brand }} {{ car.model }}</h2>
        <p><strong>0-100 km/h:</strong> {{ car.zero_to_100 }}</p>
        <p><strong>Torque:</strong> {{ car.torque }}</p>
        <p><strong>Horsepower:</strong> {{ car.hp }}</p>
        <p><strong>Top Speed:</strong> {{ car.top_speed }}</p>
    </div>
    {% endfor %}
</body>
</html>
